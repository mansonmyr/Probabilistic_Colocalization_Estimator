name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # This adds the manual "Run" button
  
permissions: 
 contents: write  # This gives the robot permission to create the Release

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install pyinstaller n2v statsmodels tifffile

      - name: Build Python Sidecar
        # This runs your .mjs script to freeze the backend
        run: node build-backend-sidecar.mjs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Make backend executable
        if: matrix.os == 'macos-latest'
        run: chmod +x ./pce-backend

      - name: Build/release Electron app
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true
      
