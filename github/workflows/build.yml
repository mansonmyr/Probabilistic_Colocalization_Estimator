name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # <--- ADD THIS LINE

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Build for both Mac and Windows simultaneously
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      # --- STEP 1: PREPARE PYTHON BACKEND ---
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install pyinstaller n2v statsmodels tifffile

      - name: Build Python Sidecar
        # This uses your script to freeze the backend
        run: node scripts/build-backend-sidecar.mjs

      # --- STEP 2: PREPARE ELECTRON FRONTEND ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # --- STEP 3: PACKAGE & PUBLISH ---
      - name: Build/release Electron app
        uses: samuelmeuli/action-electron-builder@v1
        with:
          # This token allows the robot to upload files to your "Releases" page
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Tells electron-builder to actually upload the finished .dmg/.exe
          release: true
