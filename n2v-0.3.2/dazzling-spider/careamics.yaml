version: 0.1.0
experiment_name: hagen_n2v
algorithm_config:
  algorithm: n2v
  loss: n2v
  model:
    architecture: UNet
    conv_dims: 2
    num_classes: 1
    in_channels: 1
    depth: 2
    num_channels_init: 32
    final_activation: None
    n2v2: false
    independent_channels: true
    use_batch_norm: true
  optimizer:
    name: Adam
    parameters: {}
  lr_scheduler:
    name: ReduceLROnPlateau
    parameters: {}
  n2v_config:
    name: N2VManipulate
    roi_size: 11
    masked_pixel_percentage: 0.2
    remove_center: true
    strategy: uniform
    struct_mask_axis: none
    struct_mask_span: 5
data_config:
  data_type: array
  axes: SYX
  patch_size:
  - 64
  - 64
  batch_size: 32
  image_means:
  - '1.7194048e+03'
  image_stds:
  - '1.3884455e+03'
  target_means: []
  target_stds: []
  transforms:
  - name: XYFlip
    flip_x: true
    flip_y: false
    p: 0.5
  train_dataloader_params:
    shuffle: true
    num_workers: 4
    pin_memory: true
  val_dataloader_params:
    num_workers: 4
    pin_memory: true
training_config:
  lightning_trainer_config:
    max_epochs: 10
  checkpoint_callback:
    monitor: val_loss
    verbose: false
    save_weights_only: false
    save_last: true
    save_top_k: 3
    mode: min
    auto_insert_metric_name: false
